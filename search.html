<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Search Results</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<nav class="navbar">


<div class="logo">
URBAN<span>PULSE</span>
</div>

<ul class="nav-links">
<li><a href="index.html" data-i18n="nav.home">Home</a></li>
<li><a href="city-health.html" data-i18n="nav.city_health">City Health</a></li>
<li><a href="energy-nexus.html" data-i18n="nav.energy_nexus">Energy Nexus</a></li>
<li><a href="schemes.html" data-i18n="nav.schemes">Schemes</a></li>
<li><a href="traffic.html" data-i18n="nav.traffic">Traffic</a></li>
<li><a href="neighbour.html" data-i18n="nav.neighbour">Neighbour Corner</a></li>
<li><a href="sustainability.html" data-i18n="nav.sustainability">Sustainability Tools</a></li>
</ul>

<div class="nav-controls">
<div class="search-container">
<input type="text" id="globalSearch" placeholder="Search UrbanPulse..." data-i18n-placeholder="nav.search_placeholder">
<button id="searchBtn">🔍</button>
</div>

<div class="city-display" id="navCityName">
    Loading...
</div>
</div>
</nav>

<div class="container">

<section class="container">

<h2 class="page-title" data-i18n="search.title">Search Results</h2>

<div class="search-input-section">
<input type="text" id="searchQuery" placeholder="Enter your search query..." data-i18n-placeholder="nav.search_placeholder">
<button onclick="performSearch()" data-i18n="search.global_search">Global Search</button>
</div>

<div id="searchResults">
<!-- Search results will be displayed here -->
</div>

</section>
</div>

<script src="js/search.js"></script>
<script>document.addEventListener("DOMContentLoaded", () => {
    const city = localStorage.getItem("city") || "Pune";
    const navCity = document.getElementById("navCityName");
    if (navCity) {
        navCity.innerText = city;
    }

    // Check for search query in URL parameters
    const urlParams = new URLSearchParams(window.location.search);
    const query = urlParams.get('q');
    if (query) {
        document.getElementById('searchQuery').value = query;
        performSearch(query);
    }
});</script>

</body>
</html>
