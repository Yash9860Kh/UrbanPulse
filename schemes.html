<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>City Schemes</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<nav class="navbar">


<div class="logo">
URBAN<span>PULSE</span>
</div>

<ul class="nav-links">
<li><a href="index.html">Home</a></li>
<li><a href="city-health.html">City Health</a></li>
<li><a href="energy-nexus.html">Energy Nexus</a></li>
<li><a href="schemes.html">Schemes</a></li>
<li><a href="traffic.html">Traffic</a></li>
<li><a href="neighbour.html">Neighbour Corner</a></li>
</ul>
<div class="city-display" id="navCityName">
    Loading...
</nav>

<section class="container">

<h2 class="page-title">Sustainability Schemes</h2>


<select id="filter">

<option value="all">All</option>
<option value="gov">Government</option>
<option value="ngo">NGO</option>
<option value="private">Private</option>

</select>


<div class="card-grid" id="schemesContainer">

</div>

</section>


<script>


document.addEventListener("DOMContentLoaded", () => {

const city = localStorage.getItem("city") || "Pune"

document.getElementById("navCityName").innerText = city

const schemesContainer = document.getElementById("schemesContainer")

const schemesData = {

Pune:[
{name:"Pune S1 Solar Homes",type:"gov",date:"30 Aug"},
{name:"Pune S2 Green Transport",type:"ngo",date:"12 Sept"},
{name:"Pune S3 Water Saving",type:"private",date:"5 Oct"},
{name:"Pune S4 Clean Streets",type:"gov",date:"20 Sept"},
{name:"Pune S5 Tree Boost",type:"ngo",date:"10 Oct"}
],

Mumbai:[
{name:"Mumbai S1 Solar Homes",type:"gov",date:"25 Aug"},
{name:"Mumbai S2 Coastal Clean",type:"ngo",date:"15 Sept"},
{name:"Mumbai S3 Smart Drainage",type:"private",date:"2 Oct"},
{name:"Mumbai S4 EV Promotion",type:"gov",date:"18 Sept"},
{name:"Mumbai S5 Mangrove Protection",type:"ngo",date:"28 Sept"}
],

Delhi:[
{name:"Delhi S1 Solar Homes",type:"gov",date:"30 Aug"},
{name:"Delhi S2 Air Quality Drive",type:"ngo",date:"12 Sept"},
{name:"Delhi S3 Smart Water",type:"private",date:"3 Oct"},
{name:"Delhi S4 Green Schools",type:"gov",date:"15 Sept"},
{name:"Delhi S5 Tree Shield",type:"ngo",date:"10 Oct"}
],

Bangalore:[
{name:"Bangalore S1 Solar Homes",type:"gov",date:"28 Aug"},
{name:"Bangalore S2 Lake Revival",type:"ngo",date:"18 Sept"},
{name:"Bangalore S3 Smart Irrigation",type:"private",date:"8 Oct"},
{name:"Bangalore S4 EV Awareness",type:"gov",date:"22 Sept"},
{name:"Bangalore S5 Tree Corridor",type:"ngo",date:"15 Oct"}
]

}

function displaySchemes(filter="all"){

schemesContainer.innerHTML=""

const citySchemes = schemesData[city]

citySchemes.forEach(scheme=>{

if(filter==="all" || scheme.type===filter){

const card = document.createElement("div")

card.className = `card scheme ${scheme.type}`

card.innerHTML = `

<h3>${scheme.name}</h3>

<p>Provider : ${scheme.type.toUpperCase()}</p>

<p>Last Date : ${scheme.date}</p>

<button>View Details</button>

`

schemesContainer.appendChild(card)

}

})

}

displaySchemes()

document.getElementById("filter").addEventListener("change",(e)=>{

displaySchemes(e.target.value)

})

})

</script>

</body>
</html>
